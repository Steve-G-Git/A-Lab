<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompTIA A+ Lab Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #050905;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Share Tech Mono', monospace;
    }

    /* ── Top nav ── */
    #topnav {
      width: 100%;
      max-width: 900px;
      background: #0d1a0d;
      border-bottom: 1px solid #1a3a1a;
      border-left: 1px solid #1a2e1a;
      border-right: 1px solid #1a2e1a;
      padding: 0 16px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      font-size: 12px;
    }

    #topnav a {
      color: #2d6b2d;
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.15s;
    }

    #topnav a:hover { color: #33ff33; }
    #topnav .nav-right { color: #1a4a1a; }

    /* ── Lab container ── */
    #lab {
      width: 100%;
      max-width: 900px;
      flex: 1;
      background: #0a0e0a;
      color: #33ff33;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #1a2e1a;
      border-right: 1px solid #1a2e1a;
    }

    /* ── Top bar ── */
    #topbar {
      background: #0d1a0d;
      border-bottom: 1px solid #1f3d1f;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .dots { display: flex; gap: 7px; align-items: center; }
    .dot { width: 11px; height: 11px; border-radius: 50%; }
    .dot-r { background: #3a1a1a; border: 1px solid #8b2020; }
    .dot-y { background: #2a2a1a; border: 1px solid #8b8020; }
    .dot-g { background: #1a3a1a; border: 1px solid #208b20; }
    #title-bar { font-family: 'VT323', monospace; font-size: 18px; color: #55cc55; letter-spacing: 3px; }
    #status-bar { font-size: 11px; color: #2d6b2d; }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      background: #080d08;
      border-bottom: 1px solid #1a3a1a;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    #tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 8px 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #2d6b2d;
      cursor: pointer;
      white-space: nowrap;
      border: none;
      border-right: 1px solid #1a3a1a;
      border-bottom: 2px solid transparent;
      background: none;
      outline: none;
      transition: all 0.15s;
    }
    .tab:hover { color: #55cc55; background: #0d1a0d; }
    .tab.active { color: #33ff33; border-bottom: 2px solid #33ff33; background: #0a0e0a; }

    /* ── Terminal ── */
    #terminal {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow: hidden;
    }

    #output {
      flex: 1;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.75;
      margin-bottom: 12px;
      scrollbar-width: thin;
      scrollbar-color: #1f3d1f #0a0e0a;
      min-height: 0;
    }
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: #0a0e0a; }
    #output::-webkit-scrollbar-thumb { background: #1f3d1f; border-radius: 3px; }

    .line-cmd     { color: #33ff33; }
    .line-out     { color: #aaffaa; }
    .line-err     { color: #ff5555; }
    .line-warn    { color: #ffcc44; }
    .line-info    { color: #44ccff; }
    .line-success { color: #55ff55; font-weight: bold; }
    .line-dim     { color: #2d6b2d; }
    .line-score   { color: #ffcc44; }

    .prompt-row {
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid #1a3a1a;
      padding-top: 12px;
      flex-shrink: 0;
    }

    #prompt-label {
      color: #33ff33;
      font-size: 14px;
      white-space: nowrap;
      font-family: 'Share Tech Mono', monospace;
      flex-shrink: 0;
    }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #33ff33;
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      caret-color: #33ff33;
      min-width: 0;
    }
    #cmd-input::placeholder { color: #1f4a1f; }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>

  <!-- Back to portfolio nav -->

    </div>
  </div>

        ['out',  '2. Quarantine the infected system (disconnect from network)'],
        ['out',  '3. Disable System Restore (prevents malware hiding in restore points)'],
        ['out',  '4. Boot into Safe Mode'],
        ['out',  '5. Run up-to-date anti-malware scan'],
        ['out',  '6. Remove all identified threats'],
        ['out',  '7. Re-enable System Restore, create new restore point'],
        ['out',  '8. Update and patch the system'],
        ['info', '9. Educate the user — how did this happen?'],
        ['warn', 'If you cannot remove it, consider nuke and pave (wipe and reinstall)'],
      ]
    },
  }
};

const quizBank = [
  { q: 'What RAID level provides striping with NO fault tolerance?', a: ['raid 0','0'], hint: 'Speed over safety.', domain: 'hardware', xp: 10 },
  { q: 'What color indicates a USB 3.0 port (5 Gbps)?', a: ['blue'], hint: 'Blue = fast.', domain: 'hardware', xp: 10 },
  { q: 'Which form factor does laptop RAM use?', a: ['so-dimm','sodimm'], hint: 'Small Outline...', domain: 'hardware', xp: 10 },
  { q: 'What connects to the 24-pin ATX connector on a motherboard?', a: ['psu','power supply','power supply unit'], hint: 'The big cable from your PSU.', domain: 'hardware', xp: 10 },
  { q: 'What RAID level requires minimum 3 disks and tolerates 1 failure?', a: ['raid 5','5'], hint: 'Uses parity.', domain: 'hardware', xp: 15 },
  { q: 'What port does SSH use by default?', a: ['22','port 22'], hint: 'Small number.', domain: 'networking', xp: 10 },
  { q: 'Which OSI layer do routers operate at?', a: ['layer 3','3','network','network layer'], hint: 'Think IP addresses.', domain: 'networking', xp: 10 },
  { q: 'What is the APIPA address range when DHCP fails?', a: ['169.254','169.254.x.x','169.254.0.0'], hint: 'Starts with 169.', domain: 'networking', xp: 15 },
  { q: 'Which port does HTTPS use?', a: ['443','port 443'], hint: 'Three digits, starts with 4.', domain: 'networking', xp: 5 },
  { q: 'Which 802.11 standard is Wi-Fi 6?', a: ['802.11ax','11ax','ax'], hint: 'After ac comes...', domain: 'networking', xp: 15 },
  { q: 'What non-overlapping 2.4GHz channels should you use?', a: ['1 6 11','1, 6, 11','channels 1 6 11'], hint: 'Three specific numbers.', domain: 'networking', xp: 15 },
  { q: 'Which command scans and repairs corrupt Windows system files?', a: ['sfc /scannow','sfc'], hint: 'System File Checker.', domain: 'os', xp: 10 },
  { q: 'What Windows tool manages device drivers?', a: ['device manager','devmgmt.msc'], hint: 'Yellow exclamation marks live here.', domain: 'os', xp: 10 },
  { q: 'What file system does Windows use for modern drives?', a: ['ntfs'], hint: 'Supports encryption and ACLs.', domain: 'os', xp: 10 },
  { q: 'What key command opens Task Manager on Windows?', a: ['ctrl+shift+esc','ctrl shift esc'], hint: 'Three keys.', domain: 'os', xp: 5 },
  { q: 'What does MFA stand for?', a: ['multi-factor authentication','multifactor authentication'], hint: 'More than one way to prove identity.', domain: 'security', xp: 5 },
  { q: 'Which hash algorithm is broken and should NOT be used?', a: ['md5','sha-1','sha1'], hint: 'Old 90s-era algorithms.', domain: 'security', xp: 15 },
  { q: 'What malware disguises itself as legitimate software?', a: ['trojan','trojan horse'], hint: 'Greek mythology.', domain: 'security', xp: 10 },
  { q: 'What is the principle of least privilege?', a: ['minimum access','only minimum access needed','least access needed'], hint: 'Give only what is needed.', domain: 'security', xp: 10 },
  { q: 'What malware self-replicates across a network without a host file?', a: ['worm'], hint: 'No file needed to spread.', domain: 'security', xp: 10 },
];

function print(text, cls = 'line-out') {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  out.appendChild(div);
  out.scrollTop = out.scrollHeight;
}

function blank() { print(''); }

function addXP(n) {
  state.xp += n;
  scoreDisplay.textContent = 'XP: ' + state.xp;
  print('  +' + n + ' XP!', 'line-score');
}

function showBanner() {
  out.innerHTML = '';
  print('  CompTIA A+ Lab Terminal', 'line-info');
  print('  Core 1 (220-1101) + Core 2 (220-1102)', 'line-dim');
  blank();
  print('  Domains: Hardware | Networking | OS | Security', 'line-out');
  blank();
  print('  Type "help" to see all commands.', 'line-warn');
  blank();
}

function showHelp() {
  const m = state.module;
  blank();
  print('  COMMANDS', 'line-info');
  print('  ──────────────────────────────────────', 'line-dim');
  print('  cd <module>  — navigate to a module', 'line-out');
  print('  ls           — list topics in current module', 'line-out');
  print('  cat <topic>  — display topic details (+5 XP)', 'line-out');
  print('  quiz         — go to quiz module', 'line-out');
  print('  score        — show your XP and rank', 'line-out');
  print('  clear        — clear terminal', 'line-out');
  print('  home         — return to home screen', 'line-out');
  blank();
  print('  MODULES', 'line-info');
  print('  ──────────────────────────────────────', 'line-dim');
  print('  hardware | networking | os | security | quiz', 'line-out');
  blank();
  if (m !== 'home' && m !== 'quiz' && data[m]) {
    const topics = Object.keys(data[m]).join(' | ');
    print('  TOPICS IN ~/' + m.toUpperCase(), 'line-info');
    print('  ──────────────────────────────────────', 'line-dim');
    print('  ' + topics, 'line-out');
    blank();
  }
  if (m === 'quiz') {
    print('  QUIZ COMMANDS', 'line-info');
    print('  ──────────────────────────────────────', 'line-dim');
    print('  start              — all domains (10 questions)', 'line-out');
    print('  start hardware     — hardware only', 'line-out');
    print('  start networking   — networking only', 'line-out');
    print('  start os           — OS only', 'line-out');
    print('  start security     — security only', 'line-out');
    blank();
    print('  During quiz: "hint" for a clue | "skip" to skip', 'line-dim');
    blank();
  }
}

function showLS() {
  const m = state.module;
  blank();
  if (m === 'home') {
    print('  MODULES', 'line-info');
    ['hardware','networking','os','security','quiz'].forEach(n => {
      print('  drwxr-xr-x  ' + n + '/', 'line-out');
    });
  } else if (m === 'quiz') {
    print('  Quiz mode — no files to list.', 'line-dim');
    print('  Type "start" to begin a quiz.', 'line-out');
  } else if (data[m]) {
    print('  TOPICS IN ~/' + m.toUpperCase(), 'line-info');
    Object.keys(data[m]).forEach(k => {
      print('  -rw-r--r--  ' + k + '.md', 'line-out');
    });
    blank();
    print('  Use: cat <topic> to read', 'line-dim');
  }
  blank();
}

function showCat(topic) {
  const m = state.module;
  let found = null;
  if (m !== 'home' && m !== 'quiz' && data[m] && data[m][topic]) {
    found = data[m][topic];
  } else {
    for (const s of Object.keys(data)) {
      if (data[s][topic]) { found = data[s][topic]; break; }
    }
  }
  if (!found) {
    print('  cat: ' + topic + ': No such file', 'line-err');
    print('  Use "ls" to list available topics.', 'line-dim');
    return;
  }
  blank();
  print('  ══════════════════════════════════════', 'line-dim');
  print('  ' + found.title, 'line-info');
  print('  ══════════════════════════════════════', 'line-dim');
  found.body.forEach(([cls, txt]) => print('  ' + txt, 'line-' + cls));
  blank();
  addXP(5);
}

function showScore() {
  blank();
  print('  XP: ' + state.xp, 'line-score');
  const rank =
    state.xp < 30  ? 'Trainee Technician' :
    state.xp < 80  ? 'Help Desk I' :
    state.xp < 150 ? 'Support Technician' :
    state.xp < 250 ? 'A+ Candidate' :
    state.xp < 400 ? 'Senior Technician' :
                     'CompTIA A+ Ready!';
  print('  Rank: ' + rank, 'line-info');
  blank();
}

function switchModule(mod) {
  state.module = mod;
  state.quizActive = false;
  currentQuiz = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.trim() === '~/' + mod) t.classList.add('active');
  });
  promptLabel.textContent = prompts[mod] || 'user@aplus-lab:~$';
  if (mod === 'home') { showBanner(); inp.focus(); return; }
  out.innerHTML = '';
  blank();
  print('  [ ' + mod.toUpperCase() + ' ]', 'line-info');
  print('  ──────────────────────────────────────', 'line-dim');
  if (mod === 'quiz') {
    print('  Ready to test your knowledge?', 'line-out');
    blank();
    print('  start              — all domains', 'line-out');
    print('  start hardware     — hardware only', 'line-out');
    print('  start networking   — networking only', 'line-out');
    print('  start os           — OS only', 'line-out');
    print('  start security     — security only', 'line-out');
  } else if (data[mod]) {
    const topics = Object.keys(data[mod]).join(', ');
    print('  Topics: ' + topics, 'line-out');
    blank();
    print('  Use "cat <topic>" to study | "ls" to list all', 'line-dim');
  }
  blank();
  inp.focus();
}

let quizQueue = [];
let currentQuiz = null;
let quizScore = 0;
let quizTotal = 0;
let quizIndex = 0;

function startQuiz(domain) {
  state.quizActive = true;
  quizScore = 0;
  quizQueue = quizBank
    .filter(q => !domain || q.domain === domain)
    .sort(() => Math.random() - 0.5)
    .slice(0, 10);
  quizTotal = quizQueue.length;
  quizIndex = 0;
  blank();
  print('  ╔══════════════════════════════════════╗', 'line-warn');
  print('  ║   QUIZ MODE                          ║', 'line-warn');
  print('  ║   ' + quizTotal + ' questions — ' + (domain || 'all domains') + ' '.repeat(Math.max(0, 20 - (domain || 'all domains').length)) + '║', 'line-warn');
  print('  ╚══════════════════════════════════════╝', 'line-warn');
  blank();
  print('  Type your answer and press Enter.', 'line-dim');
  print('  "hint" for a clue | "skip" to skip', 'line-dim');
  blank();
  nextQuestion();
}

function nextQuestion() {
  if (quizIndex >= quizQueue.length) { endQuiz(); return; }
  currentQuiz = quizQueue[quizIndex++];
  print('  [' + quizIndex + '/' + quizTotal + '] <' + currentQuiz.domain.toUpperCase() + '>', 'line-info');
  print('  ' + currentQuiz.q, 'line-warn');
  blank();
}

function checkAnswer(ans) {
  if (!currentQuiz) return;
  const clean = ans.toLowerCase().trim();
  const correct = currentQuiz.a.some(a => clean.includes(a.toLowerCase()));
  if (correct) {
    print('  Correct!', 'line-success');
    addXP(currentQuiz.xp);
    quizScore++;
  } else {
    print('  Wrong. Answer: ' + currentQuiz.a[0], 'line-err');
  }
  blank();
  currentQuiz = null;
  setTimeout(nextQuestion, 250);
}

function endQuiz() {
  state.quizActive = false;
  currentQuiz = null;
  blank();
  print('  ══════════════════════════════════════', 'line-dim');
  print('  QUIZ COMPLETE', 'line-success');
  print('  Score: ' + quizScore + ' / ' + quizTotal, 'line-score');
  const pct = Math.round((quizScore / quizTotal) * 100);
  const msg =
    pct >= 90 ? 'EXCELLENT — CompTIA would be proud!' :
    pct >= 70 ? 'PASS — Keep studying!' :
    pct >= 50 ? 'BORDERLINE — Review weak areas.' :
                'Keep at it — you\'ve got this.';
  print('  ' + pct + '% — ' + msg, pct >= 70 ? 'line-success' : 'line-err');
  print('  Total session XP: ' + state.xp, 'line-score');
  print('  ══════════════════════════════════════', 'line-dim');
  blank();
  print('  Type "start" to retry | "cd <module>" to study', 'line-dim');
  blank();
}

function processCommand(raw) {
  const cmd = raw.trim().toLowerCase();
  if (!cmd) return;
  state.history.unshift(raw);
  state.historyIndex = -1;
  print('  ' + promptLabel.textContent + ' ' + raw, 'line-cmd');

  if (state.quizActive) {
    if (cmd === 'hint')  { if (currentQuiz) print('  Hint: ' + currentQuiz.hint, 'line-warn'); return; }
    if (cmd === 'skip')  { print('  Skipped. Answer: ' + (currentQuiz ? currentQuiz.a[0] : '?'), 'line-warn'); blank(); currentQuiz = null; setTimeout(nextQuestion, 200); return; }
    if (cmd === 'quit' || cmd === 'exit') { state.quizActive = false; currentQuiz = null; print('  Quiz exited.', 'line-dim'); blank(); return; }
    if (currentQuiz) { checkAnswer(raw); return; }
  }

  if (cmd === 'clear' || cmd === 'cls')         { out.innerHTML = ''; return; }
  if (cmd === 'home' || cmd === 'cd ~' || cmd === 'cd') { switchModule('home'); return; }
  if (cmd === 'help' || cmd === 'man')           { showHelp(); return; }
  if (cmd === 'ls' || cmd === 'dir')             { showLS(); return; }
  if (cmd === 'score' || cmd === 'xp')           { showScore(); return; }
  if (cmd === 'quiz')                            { switchModule('quiz'); return; }
  if (cmd === 'whoami')   { print('  student@aplus-lab — future CompTIA A+ certified tech', 'line-out'); return; }
  if (cmd === 'pwd')      { print('  /home/student/' + state.module, 'line-out'); return; }
  if (cmd === 'uname -a') { print('  APlus-Lab 1.0 (220-1101/220-1102) x86_64', 'line-out'); return; }
  if (cmd === 'date')     { print('  ' + new Date().toString(), 'line-out'); return; }

  if (cmd.startsWith('cd ')) {
    const dest = cmd.slice(3).replace(/^~\//, '').trim();
    if (['home','hardware','networking','os','security','quiz'].includes(dest)) { switchModule(dest); return; }
    print('  cd: ' + dest + ': No such directory', 'line-err');
    print('  Modules: hardware | networking | os | security | quiz', 'line-dim');
    return;
  }

  if (cmd.startsWith('cat ')) { showCat(cmd.slice(4).trim()); return; }

  if (cmd === 'start' || cmd.startsWith('start ')) {
    const domain = cmd.slice(5).trim() || null;
    const valid = ['hardware','networking','os','security'];
    if (domain && !valid.includes(domain)) {
      print('  Unknown domain: ' + domain, 'line-err');
      print('  Valid: hardware | networking | os | security', 'line-dim');
      return;
    }
    if (state.module !== 'quiz') switchModule('quiz');
    startQuiz(domain || null);
    return;
  }

  print('  Command not found: ' + raw, 'line-err');
  print('  Type "help" for available commands.', 'line-dim');
  blank();
}

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = inp.value;
    inp.value = '';
    processCommand(val);
  }
  if (e.key === 'ArrowUp') {
    state.historyIndex = Math.min(state.historyIndex + 1, state.history.length - 1);
    inp.value = state.history[state.historyIndex] || '';
    e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    state.historyIndex = Math.max(state.historyIndex - 1, -1);
    inp.value = state.historyIndex >= 0 ? state.history[state.historyIndex] : '';
    e.preventDefault();
  }
});

document.getElementById('lab').addEventListener('click', () => inp.focus());

showBanner();
inp.focus();
</script>
